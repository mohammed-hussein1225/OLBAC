<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- رابط ملف CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />

    <!-- رابط ملف JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/all.min.css" />
    <title>OLBAC | Products</title>
    <style>
      .modal.fade .btn-close {
        background-color: #007594 !important;
        font-size: 10px;
        padding: 8px;
        --bs-btn-close-bg: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='%23fff'%3e%3cpath d='M.293.293a1 1 0 0 1 1.414 0L8 6.586 14.293.293a1 1 0 1 1 1.414 1.414L9.414 8l6.293 6.293a1 1 0 0 1-1.414 1.414L8 9.414l-6.293 6.293a1 1 0 0 1-1.414-1.414L6.586 8 .293 1.707a1 1 0 0 1 0-1.414z'/%3e%3c/svg%3e");
        margin: 5px;
        margin-left: auto;
        border-radius: 50%;
        opacity: 1;
      }
      .modal.fade .modal-body h3 {
        font-size: 18pt;
        color: #007594;
        text-transform: capitalize;
        font-weight: bold;
      }
      .modal.fade .modal-body form input {
        border: none;
        margin-top: 30px;
        padding: 5px;
        border-bottom: 1px solid #ced5e1;
        outline: none;
        background-color: transparent !important;
      }
      .modal.fade .modal-body .btn {
        text-align: center;
        background-color: #007594;
        color: #fff;
        margin-top: 40px;
      }
      .modal.fade .modal-body .Forgot {
        color: #007594 !important;
        text-align: right;
        display: block;
      }
      .modal.fade .modal-body .container p:first-of-type {
        color: #007594;
        margin-top: 15px;
      }
      .modal.fade .modal-body .container p:first-of-type span svg {
        background: #db4437;
        padding: 10px;
        margin-top: 10px;
        color: white;
        border-radius: 50%;
      }
      .modal.fade .modal-body .container p:last-of-type a {
        color: #007594 !important;
      }
    </style>
  </head>
  <body>
    <div id="header-container"></div>

    <div class="container mt-5 mb-3 d-flex gap-5">
      <h2 style="font-weight: bold; color: #007594">MY CART</h2>
      <a href="#"> <button class="btn btn-dark">My order</button></a>
    </div>

    <div id="cart-box"></div>

    <div class="container">
      <div class="total">
        <p>Total</p>
        <p class="total_price"></p>
      </div>
      <button
        class="btn check w=-100"
        data-bs-toggle="modal"
        data-bs-target="#Modal"
      >
        Checkout
      </button>
    </div>

    <div class="modal fade" id="Modal">
      <div class="modal-dialog">
        <div class="modal-content">
          <button
            type="button"
            class="btn-close text-white"
            data-bs-dismiss="modal"
          ></button>
          <div class="modal-body">
            <h3 class="text-center">Welcom Back!</h3>
            <p class="text-center mt-4">Sign Up By Entering These Data</p>
            <div class="container">
              <form>
                <input
                  type="email"
                  autocomplete="current-email"
                  class="w-100"
                  placeholder="Email"
                />
                <input
                  type="password"
                  autocomplete="current-password"
                  class="w-100"
                  placeholder="Password"
                />
              </form>
              <button class="btn w-100">Login</button>
              <a href="#" class="Forgot">Forgot Password?</a>
              <p class="text-center">
                Login With

                <span class="d-block">
                  <a href="#">
                    <i class="fa-brands fa-google"></i>
                  </a>
                </span>
              </p>
              <p class="text-center">
                Dont Hav Any Account?
                <a href="#"> Register Now! </a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="footer-container"></div>
    <script src="js/bootstrap.bundle.js"></script>
    <script src="js/all.min.js"></script>
    <script src="js/main.js"></script>

    <script>
      fetch("../sections/header.html")
        .then((response) => response.text())
        .then(
          (data) =>
            (document.getElementById("header-container").innerHTML = data)
        );

      fetch("../sections/footer.html")
        .then((response) => response.text())
        .then(
          (data) =>
            (document.getElementById("footer-container").innerHTML = data)
        );
    </script>
  </body>
</html>
